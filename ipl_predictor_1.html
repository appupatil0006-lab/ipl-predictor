  .player-card.vinod .player-name { color:var(--vinod); }

  .vs-badge { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--gold); text-shadow:0 0 20px rgba(255,215,0,0.6); }

  .stat-item strong { display:block; font-family:'Bebas Neue',sans-serif; font-size:1.3rem; color:var(--text); }

  .confetti-piece { position:absolute; width:10px; height:10px; border-radius:2px; animation:confetti-fall linear forwards; }
  @keyframes confetti-fall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

    .match-row,.col-headers { grid-template-columns:42px 1fr 76px 1fr 42px; gap:0.25rem; }
    .match-row { padding:0.55rem 0.45rem; }
    .match-teams { font-size:0.88rem; }
    .team-pick { font-size:0.7rem; padding:0.18rem 0.28rem; }
    .player-card { min-width:110px; padding:0.8rem 1rem; }
    .player-score { font-size:2.8rem; }
    .scoreboard { gap:0.5rem; }

</style>
</head>

function celebrate(n){
  const s=state[n];
  const ac=s.appu===s.winner, vc=s.vinod===s.winner;
  if(!ac&&!vc) return;
  const col=ac&&vc?['#00C6FF','#FF6B35','#FFD700','#00E676']:ac?['#00C6FF','#FFD700','#00E676']:['#FF6B35','#FFD700','#00E676'];
  const c=document.getElementById('confetti'); c.innerHTML='';
  for(let i=0;i<45;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${col[i%col.length]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;transform:rotate(${Math.random()*360}deg)`;
    c.appendChild(el); setTimeout(()=>el.remove(),3600);
  }
}

function calcScores(){
  let aS=0,vS=0,aT=0,vT=0,played=0,both=0;
  MATCHES.forEach(m=>{
    const s=state[m.m]; if(!s.winner) return;
    played++;
    if(s.appu){aT++;if(s.appu===s.winner)aS++;}
    if(s.vinod){vT++;if(s.vinod===s.winner)vS++;}
    if(s.appu===s.winner&&s.vinod===s.winner)both++;
  });
  return{aS,vS,aT,vT,played,both};
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}

function visible(m){
  const s=state[m.m];
  if(currentFilter==='pending')       return !s.winner;
  if(currentFilter==='done')          return !!s.winner;
  if(currentFilter==='correct-appu')  return s.winner&&s.appu===s.winner;
  if(currentFilter==='correct-vinod') return s.winner&&s.vinod===s.winner;
  if(currentFilter==='both')          return s.winner&&s.appu===s.winner&&s.vinod===s.winner;
  return true;
}

function render(){
  const sc=calcScores();
  document.getElementById('score-appu').textContent=sc.aS;
  document.getElementById('score-vinod').textContent=sc.vS;
  document.getElementById('stats-appu').textContent=sc.aS+' / '+sc.aT+' correct';
  document.getElementById('stats-vinod').textContent=sc.vS+' / '+sc.vT+' correct';
  document.getElementById('acc-appu').style.width=(sc.aT?Math.round(sc.aS/sc.aT*100):0)+'%';
  document.getElementById('acc-vinod').style.width=(sc.vT?Math.round(sc.vS/sc.vT*100):0)+'%';
  document.getElementById('total-played').textContent=sc.played;
  document.getElementById('total-left').textContent=TOTAL-sc.played;
  document.getElementById('both-correct').textContent=sc.both;

  const ca=document.getElementById('card-appu'),cv=document.getElementById('card-vinod');
  ca.classList.remove('leading');cv.classList.remove('leading');
  if(sc.aS>sc.vS) ca.classList.add('leading');
  else if(sc.vS>sc.aS) cv.classList.add('leading');

  const grid=document.getElementById('match-grid');
  grid.innerHTML='';
  let lastPhase=null,delay=0;

  MATCHES.forEach(m=>{
    if(!visible(m)) return;
    if(m.phase!==lastPhase){
      lastPhase=m.phase;
      const d=document.createElement('div'); d.className='phase-divider';
      d.innerHTML=`<span class="phase-label">— ${m.phase} —</span><div class="phase-line"></div>`;
      grid.appendChild(d);
    }
    const s=state[m.m];
    const ac=s.winner&&s.appu===s.winner, vc=s.winner&&s.vinod===s.winner;
    const isTbd=m.t1==='TBD', teams=isTbd?['TBD']:[m.t1,m.t2];

    const aBtns=teams.map(t=>`<button class="team-pick${s.appu===t?' sel-appu':''}" onclick="setAppu(${m.m},'${t}')">${t}</button>`).join('');
    const vBtns=teams.map(t=>`<button class="team-pick${s.vinod===t?' sel-vinod':''}" onclick="setVinod(${m.m},'${t}')">${t}</button>`).join('');
    const wBadges=teams.map(t=>`<button class="winner-badge${s.winner===t?' selected':''}" onclick="setWinner(${m.m},'${t}')">${t}${s.winner===t?' 🏏':''}</button>`).join('');

    const aMark=s.winner&&s.appu?(ac?'<div class="result-mark correct">✓</div>':'<div class="result-mark wrong">✗</div>'):'<div class="result-mark pending">?</div>';
    const vMark=s.winner&&s.vinod?(vc?'<div class="result-mark correct">✓</div>':'<div class="result-mark wrong">✗</div>'):'<div class="result-mark pending">?</div>';

    const row=document.createElement('div');
    row.className='match-row'+(s.winner?' completed':'')+(ac&&vc?' correct-both':'');
    row.style.animationDelay=(delay*0.025)+'s'; delay++;
    row.innerHTML=`
      <div class="pred-cell"><div class="pred-select">${aBtns}</div>${aMark}</div>
      <div></div>
      <div class="match-info">
        <div class="match-num">M${m.m}</div>
        <div class="match-teams">${m.t1} <span>vs</span> ${m.t2}</div>
        <div class="match-date">${m.date}</div>
        <div class="match-venue">${m.venue}</div>
        <div class="winner-row">${wBadges}</div>
      </div>
      <div></div>
      <div class="pred-cell"><div class="pred-select">${vBtns}</div>${vMark}</div>`;
    grid.appendChild(row);
  });
}
render();
</script>
</body>
</html>
